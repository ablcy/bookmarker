<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - 简易聊天工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div id="auth-screen" class="screen">
            <div class="auth-container">
                <h1>Chat</h1>
                <div class="auth-tabs">
                    <button id="login-tab" class="active">登录</button>
                    <button id="register-tab">注册</button>
                </div>
                
                <form id="login-form">
                    <input type="text" id="login-username" placeholder="用户名" required>
                    <input type="password" id="login-password" placeholder="密码" required>
                    <button type="submit">登录</button>
                    <p class="error-message" id="login-error"></p>
                </form>
                
                <form id="register-form" style="display: none;">
                    <input type="text" id="register-username" placeholder="用户名" required>
                    <input type="password" id="register-password" placeholder="密码" required>
                    <input type="password" id="register-password-confirm" placeholder="确认密码" required>
                    <button type="submit">注册</button>
                    <p class="error-message" id="register-error"></p>
                </form>
            </div>
        </div>

        <div id="main-screen" class="screen" style="display: none;">
            <div class="main-container">
                <aside class="sidebar">
                    <div class="user-info">
                        <div class="avatar">
                            <span>{{currentUser?.username?.charAt(0)?.toUpperCase() || '?'}}</span>
                        </div>
                        <div class="user-details">
                            <span class="username">{{currentUser?.username || '未登录'}}</span>
                            <button id="logout-btn">退出登录</button>
                        </div>
                    </div>
                    
                    <div class="sidebar-section">
                        <h3>好友列表</h3>
                        <div class="friends-list" id="friends-list">
                            <div class="empty-state">暂无好友</div>
                        </div>
                    </div>
                    
                    <div class="sidebar-section">
                        <h3>添加好友</h3>
                        <input type="text" id="add-friend-input" placeholder="输入用户名">
                        <button id="add-friend-btn">添加</button>
                        <p class="error-message" id="add-friend-error"></p>
                    </div>
                </aside>

                <main class="chat-area">
                    <div id="chat-header" class="chat-header">
                        <div class="friend-info">
                            <div class="avatar small">
                                <span>?</span>
                            </div>
                            <span class="friend-name">选择好友开始聊天</span>
                        </div>
                    </div>
                    
                    <div id="messages-container" class="messages-container">
                        <div class="empty-chat">
                            <p>选择一个好友开始聊天</p>
                        </div>
                    </div>
                    
                    <div id="message-input-area" class="message-input-area" style="display: none;">
                        <input type="text" id="message-input" placeholder="输入消息...">
                        <button id="send-btn">发送</button>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
